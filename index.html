<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Half & Half Studios</title>

  <link rel="icon" type="image/png" href="hahslogo.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #d9d9d9;
      color: #ffffff;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: #d9d9d9;
      overflow: hidden;
    }

    .green-shape {
      position: absolute;
      inset: 0;
      background: #1ca720;
      clip-path: polygon(0 0, 100% 0, 0 100%);
      z-index: 1;
    }

.logo-small {
  position: absolute;
  top: 85px;
  left: 30px;
  width: 590px;
  max-width: 58vw;
  z-index: 3;
    }

    .moon {
      position: absolute;
      right: 6%;
      top: 36%;
      width: 390px;
      max-width: 38vw;
      z-index: 2;
      filter: grayscale(100%);
    }

    .center-logo-section {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .center-logo {
      width: min(900px, 92vw);
    }

    .moon-section {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .large-moon {
      width: min(760px, 92vw);
      filter: grayscale(100%);
    }

    @media (max-width: 900px) {
      .logo-small {
        width: 390px;
        max-width: 60vw;
        top: 80px;
        left: 35px;
      }

      .moon {
        width: 320px;
        max-width: 45vw;
        top: 42%;
        right: 4%;
      }
    }

    @media (max-width: 600px) {
      .hero {
        min-height: 85vh;
      }

      .logo-small {
        width: 330px;
        max-width: 85vw;
        top: 70px;
        left: 22px;
      }

      .moon {
        width: 260px;
        max-width: 70vw;
        top: 52%;
        right: -20px;
      }

      .center-logo {
        width: 95vw;
      }

      .large-moon {
        width: 95vw;
      }
    }

    @media (max-width: 400px) {
      .logo-small {
        width: 280px;
        top: 60px;
        left: 18px;
      }

      .moon {
        width: 230px;
        top: 54%;
        right: -35px;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="green-shape"></div>

    <img src="hahsbanner.png" alt="Half & Half Studios logo" class="logo-small" />
    <img src="hahslogo.png" alt="Moon" class="moon" />

    <a href="#logo-section" class="continue-button">CONTINUE</a>  
  </section>

  <section class="center-logo-section">
    <img src="hahsbanner.png" alt="Half & Half Studios" class="center-logo" />
  </section>

  <section class="moon-section">
    <img src="hahslogo.png" alt="Moon" class="large-moon" />
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Welcome - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #d9d9d9;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #141414;
      overflow: hidden;
    }

    .green-shape {
      position: absolute;
      inset: 0;
      background: #3C3C3C;
      clip-path: polygon(0 0, 100% 0, 0 100%);
      z-index: 1;
    }

    .logo-small {
      position: absolute;
      top: clamp(45px, 8vh, 90px);
      left: clamp(16px, 5vw, 60px);
      width: clamp(280px, 48vw, 650px);
      z-index: 3;
    }

    .moon {
      position: absolute;
      right: clamp(-45px, 6vw, 90px);
      top: clamp(300px, 38vh, 390px);
      width: clamp(210px, 32vw, 430px);
      z-index: 2;
      filter: grayscale(100%);
    }

    .continue-button {
      position: absolute;
      left: 50%;
      bottom: clamp(45px, 12vh, 110px);
      transform: translateX(-50%);
      z-index: 4;

      padding: clamp(6px, 1.2vw, 9px) clamp(14px, 2.5vw, 22px);
      border: 2px solid #1ca720;
      border-radius: 10px;
      background: #b9e8b8;
      color: #1ca720;

      font-size: clamp(16px, 2.1vw, 26px);
      font-weight: 900;
      text-decoration: none;
      letter-spacing: 1px;

      opacity: 0;
      animation: fadeInButton 1s ease forwards;
      animation-delay: 1s;
      transition: 0.2s ease;
    }

    .continue-button:hover {
      background: #141414;
      color: #3C3C3C;
    }

    @keyframes fadeInButton {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @media (max-width: 700px) {
      .green-shape {
        clip-path: polygon(0 0, 100% 0, 0 82%);
      }

      .logo-small {
        top: 55px;
        left: 18px;
        width: min(92vw, 420px);
      }

      .moon {
        top: 46vh;
        right: -30px;
        width: min(68vw, 280px);
      }

      .continue-button {
        bottom: 58px;
      }
    }

    @media (max-width: 420px) {
      .logo-small {
        top: 48px;
        left: 14px;
        width: min(94vw, 350px);
      }

      .moon {
        top: 48vh;
        right: -45px;
        width: min(72vw, 245px);
      }

      .continue-button {
        bottom: 45px;
        border-radius: 8px;
      }
    }

    @media (max-height: 600px) {
      .logo-small {
        top: 28px;
        width: min(45vw, 460px);
      }

      .moon {
        top: 34vh;
        width: min(28vw, 300px);
      }

      .continue-button {
        bottom: 28px;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="green-shape"></div>

    <img src="../hahsbanner.png" alt="Half & Half Studios logo" class="logo-small" />
    <img src="../hahslogo.png" alt="Moon logo" class="moon" />

    <a href="../homepage/" class="continue-button">CONTINUE</a>
  </section>
</body>
</html>

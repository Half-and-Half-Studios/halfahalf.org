<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Support - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      min-height:100%;
    }

    body{
      background:#3c3c3c;
      color:#f2f2f2;
      font-family:"Inter",sans-serif;
      overflow-x:hidden;
    }

    .page{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:191px;
      background:#141414;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:8px;
      flex-shrink:0;
    }

    .sidebar-logo{
      width:180px;
      margin-bottom:18px;
    }

    .back-button{
      width:162px;
      height:41px;
      border:3px solid #1cade7;
      border-radius:8px;
      color:#1cade7;
      text-decoration:none;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:25px;
      font-weight:900;
      transition:.2s;
    }

    .back-button:hover{
      background:#1cade7;
      color:#141414;
    }

    .content{
      flex:1;
      padding:8px 24px 45px;
    }

    .title{
      font-size:clamp(42px,5vw,64px);
      font-weight:900;
      margin-bottom:18px;
    }

    .description{
      font-size:18px;
      color:#d9d9d9;
      margin-bottom:24px;
      max-width:800px;
      line-height:1.5;
    }

    .form-container{
      background:#141414;
      border-radius:12px;
      padding:16px;
      box-shadow:0 0 0 2px #1cade7;
    }

    iframe{
      width:100%;
      height:1057px;
      border:none;
      border-radius:8px;
      background:white;
    }

    .copyright{
      position:fixed;
      left:191px;
      right:0;
      bottom:0;
      height:26px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:15px;
      font-weight:400;
      color:#f2f2f2;
      background:#3c3c3c;
    }

    @media(max-width:800px){

      .page{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
        min-height:auto;
        flex-direction:row;
        gap:12px;
        justify-content:flex-start;
        padding:10px;
      }

      .sidebar-logo{
        width:120px;
        margin-bottom:0;
      }

      .back-button{
        width:auto;
        min-width:120px;
        height:36px;
        padding:0 14px;
        font-size:18px;
      }

      .content{
        padding:18px;
      }

      .copyright{
        left:0;
        font-size:13px;
      }

      iframe{
        height:1200px;
      }
    }

    @media(max-width:480px){

      .sidebar-logo{
        width:100px;
      }

      .back-button{
        min-width:98px;
        height:32px;
        font-size:15px;
      }

      .title{
        font-size:40px;
      }

      .description{
        font-size:16px;
      }

      iframe{
        height:1300px;
      }

      .copyright{
        font-size:11px;
      }

    }
  </style>
</head>

<body>

<div class="page">

  <aside class="sidebar">

    <img src="../hahslogo.png" class="sidebar-logo" alt="Half & Half Studios">

    <a href="../homepage/" class="back-button">BACK</a>

  </aside>

  <main class="content">

    <h1 class="title">SUPPORT</h1>

    <p class="description">
      Need help? Fill out the support form below. Our team will review your request and respond to the email address you provide as soon as possible.
    </p>

    <div class="form-container">

      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfnI5N2tPzj8EuIAbGAkAawQkJngVa89OzXg_zdrptKWE9eow/viewform?embedded=true"
        loading="lazy">
        Loading…
      </iframe>

    </div>

  </main>

</div>

<footer class="copyright">
  © 2026 Half &amp; Half Studios. All rights reserved.
</footer>

</body>
</html>

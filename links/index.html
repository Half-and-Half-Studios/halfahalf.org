<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Links - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #3c3c3c;
      color: #f2f2f2;
      font-family: "Inter", Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      background: #3c3c3c;
    }

    .sidebar {
      width: 191px;
      min-height: 100vh;
      background: #141414;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      width: 180px;
      margin-bottom: 18px;
    }

    .back-button {
      width: 162px;
      height: 41px;
      border: 3px solid #1cade7;
      border-radius: 8px;
      color: #1cade7;
      background: transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      transition: 0.2s ease;
    }

    .back-button:hover {
      background: #1cade7;
      color: #141414;
    }

    .content {
      flex: 1;
      min-height: 100vh;
      padding: 8px 28px 60px;
      overflow-x: hidden;
    }

    .title {
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 900;
      color: #f2f2f2;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 30px;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 220px));
      gap: 26px;
      align-items: start;
    }

    .link-card {
      background: #111111;
      border-radius: 14px;
      padding: 18px;
      min-height: 230px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      text-decoration: none;
      color: #f2f2f2;
      transition: 0.2s ease;
    }

    .link-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 0 3px #1cade7;
    }

    .link-card img {
      width: 125px;
      height: 125px;
      object-fit: contain;
      margin-bottom: 15px;
    }

    .link-card h2 {
      font-size: 23px;
      font-weight: 900;
      color: #f2f2f2;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .link-card p {
      font-size: 14px;
      font-weight: 400;
      color: #bdbdbd;
      margin-top: 6px;
    }

    .hidden-link {
      display: none;
    }

    .copyright {
      position: fixed;
      left: 191px;
      right: 0;
      bottom: 0;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f2f2f2;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.2px;
      z-index: 5;
      background: #3c3c3c;
    }

    @media (max-width: 800px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
        padding: 10px 12px;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        overflow-x: auto;
      }

      .sidebar-logo {
        width: 120px;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .back-button {
        width: auto;
        min-width: 120px;
        height: 36px;
        padding: 0 14px;
        font-size: 18px;
        border-width: 2px;
      }

      .content {
        min-height: calc(100vh - 76px);
        padding: 18px 18px 60px;
      }

      .links-grid {
        grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
        gap: 18px;
      }

      .copyright {
        left: 0;
        font-size: 13px;
        padding: 0 10px;
      }
    }

    @media (max-width: 480px) {
      .sidebar-logo {
        width: 100px;
      }

      .back-button {
        min-width: 98px;
        height: 32px;
        font-size: 15px;
      }

      .title {
        font-size: 40px;
      }

      .link-card {
        min-height: 200px;
        padding: 14px;
      }

      .link-card img {
        width: 105px;
        height: 105px;
      }

      .link-card h2 {
        font-size: 19px;
      }

      .copyright {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <aside class="sidebar">
      <img src="../hahslogo.png" alt="Half & Half Studios logo" class="sidebar-logo">

      <a href="../homepage/" class="back-button">BACK</a>
    </aside>

    <main class="content">
      <h1 class="title">LINKS</h1>

      <section class="links-grid">

          <img src="../discotools-xyz-icon.png" alt="Half & Half Studios TikTok">
          <div>
            <h2>TIKTOK</h2>
            <p>Half &amp; Half Studios</p>
          </div>
        </a>

        <a class="link-card" href="https://www.youtube.com/@halfahalfstudios" target="_blank" rel="noopener noreferrer">
          <img src="../discotools-xyz-icon%20(1).png" alt="Half & Half Studios YouTube">
          <div>
            <h2>YOUTUBE</h2>
            <p>Half &amp; Half Studios</p>
          </div>
        </a>

        <a class="link-card" href="https://github.com/Half-and-Half-Studios" target="_blank" rel="noopener noreferrer">
          <img src="../discotools-xyz-icon%20(2).png" alt="Half & Half Studios GitHub">
          <div>
            <h2>GITHUB</h2>

          </div>
        </a>

        <a class="link-card" href="https://www.tiktok.com/@sehethedev?is_from_webapp=1&sender_device=pc" target="_blank" rel="noopener noreferrer">
          <img src="../discotools-xyz-icon%20(3).png" alt="Seh TikTok">
          <div>
            <h2>SEH</h2>
            <p>TikTok</p>
          </div>
        </a>

        <a class="link-card" href="https://www.tiktok.com/@axo_the_dev?is_from_webapp=1&sender_device=pc" target="_blank" rel="noopener noreferrer">
          <img src="../discotools-xyz-icon%20(4).png" alt="AxoTheDev TikTok">
          <div>
            <h2>AXOTHEDEV</h2>
            <p>TikTok</p>
          </div>
        </a>

        <a class="link-card hidden-link" href="#">
          <img src="../discotools-xyz-icon%20(5).png" alt="Green tools">
          <div>
            <h2>TOOLS</h2>
            <p>Coming soon</p>
          </div>
        </a>

        <a class="link-card hidden-link" href="#">
          <img src="../discotools-xyz-icon%20(6).png" alt="Blue hammer">
          <div>
            <h2>TOOLS</h2>
            <p>Coming soon</p>
          </div>
        </a>
      </section>
    </main>
  </div>

  <footer class="copyright">
    © 2026 Half &amp; Half Studios. All rights reserved.
  </footer>
</body>
</html>

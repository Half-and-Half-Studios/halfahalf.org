<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Our Team - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #3c3c3c;
      color: #f2f2f2;
      font-family: "Inter", Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      background: #3c3c3c;
    }

    .sidebar {
      width: 191px;
      min-height: 100vh;
      background: #141414;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      width: 180px;
      margin-bottom: 18px;
    }

    .back-button {
      width: 162px;
      height: 41px;
      border: 3px solid #1cade7;
      border-radius: 8px;
      color: #1cade7;
      background: transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      transition: 0.2s ease;
    }

    .back-button:hover {
      background: #1cade7;
      color: #141414;
    }

    .content {
      flex: 1;
      min-height: 100vh;
      padding: 8px 28px 65px;
      overflow-x: hidden;
    }

    .title {
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 900;
      color: #f2f2f2;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 32px;
    }

    .team-section {
      margin-bottom: 42px;
    }

    .section-title {
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 900;
      color: #1cade7;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 18px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 340px));
      gap: 28px;
      align-items: stretch;
    }

    .team-card {
      position: relative;
      min-height: 250px;
      background: #111111;
      color: #f2f2f2;
      padding: 30px 26px 28px;
      clip-path: polygon(
        0 10%,
        13% 0,
        100% 0,
        100% 90%,
        87% 100%,
        0 100%
      );
      transition: 0.2s ease;
      overflow: hidden;
    }

    .team-card:hover {
      transform: translateY(-5px);
    }

    .team-card::before {
      content: "";
      position: absolute;
      inset: 3px;
      background: #181818;
      clip-path: polygon(
        0 10%,
        13% 0,
        100% 0,
        100% 90%,
        87% 100%,
        0 100%
      );
      z-index: 0;
    }

    .team-card::after {
      content: "";
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 24px;
      height: 3px;
      background: #1cade7;
      z-index: 1;
    }

    .team-inner {
      position: relative;
      z-index: 2;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .username {
      font-size: 34px;
      font-weight: 900;
      color: #f2f2f2;
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .role-icon {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .role {
      font-size: 21px;
      font-weight: 400;
      color: #d9d9d9;
      line-height: 1.3;
      max-width: 260px;
      margin-bottom: 18px;
    }

    .socials {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .social-link {
      width: 42px;
      height: 42px;
      border: 2px solid #1cade7;
      border-radius: 9px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .social-link:hover {
      background: #1cade7;
      transform: translateY(-2px);
    }

    .social-link img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .owner {
      box-shadow: 0 0 0 3px #35d62b;
    }

    .co-owner {
      box-shadow: 0 0 0 3px #e92b55;
    }

    .developer {
      box-shadow: 0 0 0 3px #39ff00;
    }

    .admin {
      box-shadow: 0 0 0 3px #1cade7;
    }

    .tester {
      box-shadow: 0 0 0 3px #ef7b0f;
    }

    .copyright {
      position: fixed;
      left: 191px;
      right: 0;
      bottom: 0;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f2f2f2;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.2px;
      z-index: 5;
      background: #3c3c3c;
    }

    @media (max-width: 800px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
        padding: 10px 12px;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        overflow-x: auto;
      }

      .sidebar-logo {
        width: 120px;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .back-button {
        width: auto;
        min-width: 120px;
        height: 36px;
        padding: 0 14px;
        font-size: 18px;
        border-width: 2px;
      }

      .content {
        min-height: calc(100vh - 76px);
        padding: 18px 18px 65px;
      }

      .team-grid {
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 22px;
      }

      .copyright {
        left: 0;
        font-size: 13px;
        padding: 0 10px;
      }
    }

    @media (max-width: 480px) {
      .sidebar-logo {
        width: 100px;
      }

      .back-button {
        min-width: 98px;
        height: 32px;
        font-size: 15px;
      }

      .title {
        font-size: 40px;
      }

      .section-title {
        font-size: 28px;
      }

      .team-card {
        min-height: 235px;
        padding: 26px 22px;
      }

      .username {
        font-size: 28px;
      }

      .role-icon {
        width: 32px;
        height: 32px;
      }

      .role {
        font-size: 18px;
      }

      .social-link {
        width: 38px;
        height: 38px;
      }

      .social-link img {
        width: 27px;
        height: 27px;
      }

      .copyright {
        font-size: 11px;
      }
    }
  </style>
</head>

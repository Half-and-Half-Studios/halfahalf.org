<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Our Team - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #3c3c3c;
      color: #f2f2f2;
      font-family: "Inter", Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      background: #3c3c3c;
    }

    .sidebar {
      width: 191px;
      min-height: 100vh;
      background: #141414;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      width: 180px;
      margin-bottom: 18px;
    }

    .back-button {
      width: 162px;
      height: 41px;
      border: 3px solid #1cade7;
      border-radius: 8px;
      color: #1cade7;
      background: transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      transition: 0.2s ease;
    }

    .back-button:hover {
      background: #1cade7;
      color: #141414;
    }

    .content {
      flex: 1;
      min-height: 100vh;
      padding: 8px 28px 65px;
      overflow-x: hidden;
    }

    .title {
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 900;
      color: #f2f2f2;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 30px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 290px));
      gap: 28px;
      align-items: stretch;
    }

    .team-card {
      position: relative;
      min-height: 390px;
      background: #111111;
      color: #f2f2f2;
      padding: 26px 22px 24px;
      clip-path: polygon(
        0 9%,
        15% 0,
        100% 0,
        100% 91%,
        85% 100%,
        0 100%
      );
      transition: 0.2s ease;
      overflow: hidden;
    }

    .team-card:hover {
      transform: translateY(-5px);
    }

    .team-card::before {
      content: "";
      position: absolute;
      inset: 3px;
      background: #181818;
      clip-path: polygon(
        0 9%,
        15% 0,
        100% 0,
        100% 91%,
        85% 100%,
        0 100%
      );
      z-index: 0;
    }

    .team-card::after {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      height: 3px;
      background: #1cade7;
      z-index: 1;
    }

    .team-inner {
      position: relative;
      z-index: 2;
      min-height: 340px;
      display: flex;
      flex-direction: column;
    }

    .icon-box {
      width: 150px;
      height: 150px;
      background: #3c3c3c;
      margin: 10px auto 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: polygon(
        0 11%,
        15% 0,
        100% 0,
        100% 89%,
        85% 100%,
        0 100%
      );
    }

    .icon-box img {
      width: 115px;
      height: 115px;
      object-fit: contain;
    }

    .username {
      font-size: 30px;
      font-weight: 900;
      color: #f2f2f2;
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .role {
      font-size: 20px;
      font-weight: 400;
      color: #d9d9d9;
      line-height: 1.25;
      max-width: 220px;
    }

    .owner {
      box-shadow: 0 0 0 3px #35d62b;
    }

    .co-owner {
      box-shadow: 0 0 0 3px #e92b55;
    }

    .developer {
      box-shadow: 0 0 0 3px #39ff00;
    }

    .admin {
      box-shadow: 0 0 0 3px #1cade7;
    }

    .copyright {
      position: fixed;
      left: 191px;
      right: 0;
      bottom: 0;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f2f2f2;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.2px;
      z-index: 5;
      background: #3c3c3c;
    }

    @media (max-width: 800px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
        padding: 10px 12px;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        overflow-x: auto;
      }

      .sidebar-logo {
        width: 120px;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .back-button {
        width: auto;
        min-width: 120px;
        height: 36px;
        padding: 0 14px;
        font-size: 18px;
        border-width: 2px;
      }

      .content {
        min-height: calc(100vh - 76px);
        padding: 18px 18px 65px;
      }

      .team-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 22px;
      }

      .copyright {
        left: 0;
        font-size: 13px;
        padding: 0 10px;
      }
    }

    @media (max-width: 480px) {
      .sidebar-logo {
        width: 100px;
      }

      .back-button {
        min-width: 98px;
        height: 32px;
        font-size: 15px;
      }

      .title {
        font-size: 40px;
      }

      .team-card {
        min-height: 350px;
        padding: 22px 18px;
      }

      .team-inner {
        min-height: 300px;
      }

      .icon-box {
        width: 130px;
        height: 130px;
        margin-bottom: 22px;
      }

      .icon-box img {
        width: 100px;
        height: 100px;
      }

      .username {
        font-size: 26px;
      }

      .role {
        font-size: 18px;
      }

      .copyright {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <aside class="sidebar">
      <img src="../hahslogo.png" alt="Half & Half Studios logo" class="sidebar-logo">

      <a href="../homepage/" class="back-button">BACK</a>
    </aside>

    <main class="content">
      <h1 class="title">OUR TEAM</h1>

      <section class="team-grid">
        <article class="team-card owner">
          <div class="team-inner">
            <div class="icon-box">
              <img src="../discotools-xyz-icon%20(3).png" alt="Owner icon">
            </div>

            <h2 class="username">Seh</h2>
            <p class="role">Owner, Scripter, Founder</p>
          </div>
        </article>

        <article class="team-card co-owner">
          <div class="team-inner">
            <div class="icon-box">
              <img src="../discotools-xyz-icon%20(4).png" alt="Co-owner icon">
            </div>

            <h2 class="username">AxoTheDev</h2>
            <p class="role">Co-Owner, Designer</p>
          </div>
        </article>

        <article class="team-card developer">
          <div class="team-inner">
            <div class="icon-box">
              <img src="../discotools-xyz-icon%20(5).png" alt="Developer icon">
            </div>

            <h2 class="username">someone</h2>
            <p class="role">Modeler, Developer</p>
          </div>
        </article>

        <article class="team-card admin">
          <div class="team-inner">
            <div class="icon-box">
              <img src="../discotools-xyz-icon%20(6).png" alt="Admin icon">
            </div>

            <h2 class="username">Marko</h2>
            <p class="role">Head Admin</p>
          </div>
        </article>

        <article class="team-card admin">
          <div class="team-inner">
            <div class="icon-box">
              <img src="../discotools-xyz-icon%20(6).png" alt="Moderator icon">
            </div>

            <h2 class="username">Vanica</h2>
            <p class="role">Senior Moderator</p>
          </div>
        </article>
      </section>
    </main>
  </div>

  <footer class="copyright">
    © 2026 Half &amp; Half Studios. All rights reserved.
  </footer>
</body>
</html>

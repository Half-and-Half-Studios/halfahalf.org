<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Application - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #34343a;
      --bg-deep: #121214;
      --panel: #131315;
      --panel-line: rgba(242, 242, 242, 0.07);
      --text: #f2f2f2;
      --text-dim: #98989e;
      --accent: #1cade7;
      --accent-dim: rgba(28, 173, 231, 0.22);
      --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      --display: "Inter", Arial, Helvetica, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(1200px 600px at 85% -10%, rgba(28, 173, 231, 0.08), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: var(--display);
      overflow-x: hidden;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 4px;
    }

    .page {
      min-height: 100vh;
      display: flex;
      background: transparent;
    }

    /* ---------- Sidebar ---------- */

    .sidebar {
      width: 191px;
      min-height: 100vh;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      align-self: flex-start;
      border-right: 1px solid var(--panel-line);
    }

    .sidebar::after {
      content: "";
      position: absolute;
      top: 0;
      right: -1px;
      width: 1px;
      height: 100%;
      background: linear-gradient(180deg, transparent, var(--accent-dim), transparent);
    }

    .sidebar-logo {
      width: 180px;
      margin-bottom: 18px;
    }

    .back-button {
      width: 162px;
      height: 41px;
      border: 3px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      background: transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }

    .back-button::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.35;
      transition: opacity 0.15s ease;
      flex-shrink: 0;
    }

    .back-button:hover,
    .back-button:focus-visible {
      background: var(--accent);
      color: var(--bg-deep);
      box-shadow: 0 0 22px var(--accent-dim);
    }

    .back-button:hover::before,
    .back-button:focus-visible::before {
      opacity: 1;
      background: var(--bg-deep);
    }

    /* ---------- Content ---------- */

    .content {
      flex: 1;
      min-height: 100vh;
      padding: 56px 40px 70px 48px;
    }

    .about-container {
      max-width: 900px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .eyebrow .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px 1px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .title {
      font-size: clamp(38px, 4.6vw, 56px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.5px;
      line-height: 1.02;
      margin-bottom: 12px;
    }

    .lede {
      font-size: 16px;
      color: var(--text-dim);
      max-width: 620px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .privacy-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13.5px;
      color: var(--text-dim);
      max-width: 620px;
      line-height: 1.5;
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--panel-line);
    }

    .privacy-note strong {
      color: var(--text);
      font-weight: 700;
    }

    /* ---------- Form panel ---------- */

    .form-panel {
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 12px;
      padding: 20px;
    }

    .form-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .form-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .form-tag .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px 1px var(--accent);
      flex-shrink: 0;
    }

    .form-bezel {
      background: #e8eaed;
      border-radius: 8px;
      overflow: hidden;
      line-height: 0;
    }

    iframe {
      display: block;
      width: 100%;
      height: 1865px;
      border: none;
    }

    /* ---------- Footer ---------- */

    .copyright {
      position: fixed;
      left: 191px;
      right: 0;
      bottom: 0;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.3px;
      z-index: 5;
      background: linear-gradient(0deg, rgba(20,20,20,0.9), transparent);
    }

    @media (max-width: 800px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
        padding: 10px 12px;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        overflow-x: auto;
        position: sticky;
        top: 0;
        z-index: 10;
        border-right: none;
        border-bottom: 1px solid var(--panel-line);
      }

      .sidebar::after { display: none; }

      .sidebar-logo {
        width: 120px;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .back-button {
        width: auto;
        min-width: 120px;
        height: 36px;
        padding: 0 14px;
        font-size: 18px;
        border-width: 2px;
      }

      .content {
        min-height: calc(100vh - 76px);
        padding: 26px 20px 70px;
      }

      .form-panel {
        padding: 14px;
      }

      iframe {
        height: 1900px;
      }

      .copyright {
        left: 0;
        font-size: 11px;
        padding: 0 10px;
      }
    }

    @media (max-width: 480px) {
      .sidebar-logo { width: 100px; }

      .back-button {
        min-width: 98px;
        height: 32px;
        font-size: 15px;
      }

      .title { font-size: 34px; }

      .form-panel { padding: 10px; }

      .copyright { font-size: 11px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <aside class="sidebar">
      <img src="../hahslogo.png" alt="Half & Half Studios logo" class="sidebar-logo">
      <a href="../homepage/" class="back-button">BACK</a>
    </aside>

    <main class="content">
      <div class="about-container">
        <p class="eyebrow"><span class="dot" aria-hidden="true"></span>Applications</p>
        <h1 class="title">Staff application</h1>
        <p class="lede">Fill out the form below to apply.</p>
        <p class="privacy-note"><strong>Privacy:</strong>&nbsp;your answers are used for internal purposes only and will not be shared.</p>

        <div class="form-panel">
          <div class="form-panel-head">
            <p class="form-tag"><span class="dot" aria-hidden="true"></span>Form — Google Forms</p>
          </div>
          <div class="form-bezel">
            <iframe
              src="https://docs.google.com/forms/d/e/1FAIpQLSfUN_Bjcw5RZ51nOusfKwriuc8tbBkGgzEpQ28sXWurbUyoRA/viewform?embedded=true"
              loading="lazy" title="Staff application form">
              Loading…
            </iframe>
          </div>
        </div>
      </div>
    </main>
  </div>

  <footer class="copyright">
    © 2026 Half &amp; Half Studios. All rights reserved.
  </footer>
</body>
</html>

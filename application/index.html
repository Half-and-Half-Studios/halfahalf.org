<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Application - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">


  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #111;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
    }

    header p {
      margin-top: 10px;
      font-size: 18px;
      color: #ddd;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .form-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    iframe {
      width: 100%;
      height: 1865px;
      border: none;
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 28px;
      }

      main {
        margin: 20px auto;
        padding: 10px;
      }

      .form-box {
        padding: 10px;
      }

      iframe {
        height: 1900px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Application Form</h1>
    <p>Fill out the form below to apply.</p>
  </header>

  <main>
    <div class="form-box">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfUN_Bjcw5RZ51nOusfKwriuc8tbBkGgzEpQ28sXWurbUyoRA/viewform?embedded=true"
        loading="lazy">
        Loading…
      </iframe>
    </div>
  </main>

  <footer>
    © 2026 Half &amp; Half Studios. All rights reserved.
  </footer>
</body>
</html>

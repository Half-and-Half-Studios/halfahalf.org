<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Games - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #34343a;
      --bg-deep: #121214;
      --panel: #131315;
      --panel-line: rgba(242, 242, 242, 0.07);
      --text: #f2f2f2;
      --text-dim: #98989e;
      --accent: #1cade7;
      --accent-dim: rgba(28, 173, 231, 0.22);
      --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      --display: "Inter", Arial, Helvetica, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(1200px 600px at 85% -10%, rgba(28, 173, 231, 0.08), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: var(--display);
      overflow-x: hidden;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 4px;
    }

    .page {
      min-height: 100vh;
      display: flex;
      background: transparent;
    }

    /* ---------- Sidebar ---------- */

    .sidebar {
      width: 191px;
      min-height: 100vh;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      align-self: flex-start;
      border-right: 1px solid var(--panel-line);
    }

    .sidebar::after {
      content: "";
      position: absolute;
      top: 0;
      right: -1px;
      width: 1px;
      height: 100%;
      background: linear-gradient(180deg, transparent, var(--accent-dim), transparent);
    }

    .sidebar-logo {
      width: 180px;
      margin-bottom: 18px;
    }

    .back-button {
      width: 162px;
      height: 41px;
      border: 3px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      background: transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }

    .back-button::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.35;
      transition: opacity 0.15s ease;
      flex-shrink: 0;
    }

    .back-button:hover,
    .back-button:focus-visible {
      background: var(--accent);
      color: var(--bg-deep);
      box-shadow: 0 0 22px var(--accent-dim);
    }

    .back-button:hover::before,
    .back-button:focus-visible::before {
      opacity: 1;
      background: var(--bg-deep);
    }

    /* ---------- Content ---------- */

    .content {
      position: relative;
      flex: 1;
      min-height: 100vh;
      padding: 56px 40px 70px 48px;
      overflow: hidden;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
    }

    .eyebrow .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px 1px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .title {
      font-size: clamp(38px, 4.6vw, 56px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.5px;
      line-height: 1.02;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
    }

    .lede {
      font-size: 16px;
      color: var(--text-dim);
      max-width: 560px;
      line-height: 1.5;
      margin-bottom: 46px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--panel-line);
      position: relative;
      z-index: 2;
    }

    /* Ghost background type — decorative only */
    .ghost-type {
      position: absolute;
      top: 96px;
      left: 48px;
      right: 20px;
      color: rgba(242, 242, 242, 0.045);
      font-size: clamp(46px, 6.4vw, 84px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 1px;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }

    .ghost-type div {
      white-space: nowrap;
    }

    /* ---------- Empty state ---------- */

    .empty-state {
      position: relative;
      z-index: 2;
      max-width: 620px;
      background: var(--panel);
      border: 1px dashed rgba(242, 242, 242, 0.18);
      border-radius: 10px;
      padding: 30px 30px 32px;
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .status-tag .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid var(--text-dim);
      flex-shrink: 0;
    }

    .empty-state h2 {
      font-size: clamp(21px, 2.4vw, 25px);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: 0.2px;
    }

    .empty-state p {
      font-size: 15.5px;
      font-weight: 400;
      line-height: 1.6;
      color: #cfcfcf;
      max-width: 520px;
    }

    /* ---------- Footer ---------- */

    .copyright {
      position: fixed;
      left: 191px;
      right: 0;
      bottom: 0;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.3px;
      z-index: 5;
      background: linear-gradient(0deg, rgba(20,20,20,0.9), transparent);
    }

    @media (max-width: 900px) {
      .ghost-type {
        font-size: clamp(34px, 5vw, 52px);
      }
    }

    @media (max-width: 800px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
        padding: 10px 12px;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        overflow-x: auto;
        position: sticky;
        top: 0;
        z-index: 10;
        border-right: none;
        border-bottom: 1px solid var(--panel-line);
      }

      .sidebar::after { display: none; }

      .sidebar-logo {
        width: 120px;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .back-button {
        width: auto;
        min-width: 120px;
        height: 36px;
        padding: 0 14px;
        font-size: 18px;
        border-width: 2px;
      }

      .content {
        min-height: calc(100vh - 76px);
        padding: 26px 20px 60px;
      }

      .ghost-type {
        top: 190px;
        left: 20px;
        font-size: clamp(24px, 7vw, 40px);
      }

      .ghost-type div {
        white-space: normal;
      }

      .empty-state {
        padding: 24px 22px 26px;
      }

      .copyright {
        left: 0;
        font-size: 11px;
        padding: 0 10px;
      }
    }

    @media (max-width: 480px) {
      .sidebar-logo { width: 100px; }

      .back-button {
        min-width: 98px;
        height: 32px;
        font-size: 15px;
      }

      .title { font-size: 34px; }

      .ghost-type {
        display: none;
      }

      .empty-state {
        padding: 20px 18px 22px;
      }

      .copyright { font-size: 11px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <aside class="sidebar">
      <img src="../hahslogo.png" alt="Half & Half Studios logo" class="sidebar-logo">
      <a href="../homepage/" class="back-button">BACK</a>
    </aside>

    <main class="content">
      <p class="eyebrow"><span class="dot" aria-hidden="true"></span>Catalog</p>
      <h1 class="title">Games</h1>
      <p class="lede">Every release will land on this page first.</p>

      <div class="ghost-type" aria-hidden="true">
        <div> </div>
        <div> </div>
      </div>

      <section class="empty-state">
        <p class="status-tag"><span class="dot" aria-hidden="true"></span>In development</p>
        <h2>Nothing shipped yet</h2>
        <p>We haven't released any games yet — thanks for checking in. When something's ready, it'll show up right here.</p>
      </section>
    </main>
  </div>

  <footer class="copyright">
    © 2026 Half &amp; Half Studios. All rights reserved.
  </footer>
</body>
</html>

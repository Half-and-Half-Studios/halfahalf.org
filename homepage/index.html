<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Homepage - Half & Half Studios</title>
  <link rel="icon" type="image/png" href="../hahslogo.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000000;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .homepage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
      width: min(850px, 90vw);
      margin-bottom: 45px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 95px);
      color: #ffffff;
      margin-bottom: 20px;
    }

    p {
      font-size: clamp(18px, 3vw, 28px);
      color: #d9d9d9;
      margin-bottom: 40px;
    }

    .back-button {
      padding: 8px 18px;
      border: 2px solid #1ca720;
      border-radius: 10px;
      background: #b9e8b8;
      color: #1ca720;

      font-size: 22px;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: 1px;
      transition: 0.2s ease;
    }

    .back-button:hover {
      background: #1ca720;
      color: #b9e8b8;
    }

    @media (max-width: 600px) {
      .homepage {
        padding: 30px 16px;
      }

      .logo {
        width: 95vw;
        margin-bottom: 35px;
      }

      .back-button {
        font-size: 18px;
        padding: 7px 15px;
      }
    }
  </style>
</head>

<body>
  <main class="homepage">
    <img src="../hahsbanner.png" alt="Half & Half Studios logo" class="logo" />

    <h1>Hello World</h1>
    <p>This is the homepage. You can replace this text later.</p>

    <a href="../welcome/" class="back-button">BACK TO WELCOME</a>
  </main>
</body>
</html>
